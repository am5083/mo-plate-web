# Fly.io config for the live-check backend.
#   fly launch --no-deploy   (first time — creates the app, pick a unique name)
#   fly deploy
#
# Scales to zero when idle (free-tier friendly) and wakes on request.
app = "mo-plate-web"
primary_region = "ord"   # Chicago — close to Missouri

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  # Cadence tuned to stay under Imperva's bot wall. Lower at your own risk.
  RATE_DELAY_MS = "750"
  JITTER_MS = "250"
  REFRESH_EVERY = "40"
  # Per-client budget so one visitor can't monopolise the single upstream queue.
  IP_RATE_CAPACITY = "8"
  IP_RATE_WINDOW_SEC = "60"
  # Lock to your Pages origin in production, e.g. https://<user>.github.io
  ALLOWED_ORIGIN = "*"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    method = "GET"
    path = "/api/health"
    interval = "30s"
    timeout = "5s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
