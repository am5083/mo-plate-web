<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Missouri Plate Finder</title>
</head>
<body>
  <div id="app"></div>
  <script src="./config.js"></script>
  <script src="./elm.js"></script>
  <script>
    // Backend URL resolution: ?api= query param, then config.js global, then empty.
    var apiBase =
      new URLSearchParams(location.search).get("api") ||
      window.MO_PLATE_API ||
      "";
    Elm.Main.init({
      node: document.getElementById("app"),
      flags: { apiBase: apiBase },
    });
  </script>
</body>
</html>
