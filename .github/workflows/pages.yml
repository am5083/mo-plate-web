name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Elm
        uses: jorelali/setup-elm@v6
        with:
          elm-version: 0.19.1

      - name: Build Elm bundle
        run: elm make src/Main.elm --optimize --output=elm.js

      - name: Assemble site
        run: |
          mkdir -p _site
          cp index.html config.js elm.js _site/
          # Point the deployed site at the backend, if the BACKEND_URL repo
          # variable is set (Settings → Secrets and variables → Actions → Variables).
          if [ -n "${{ vars.BACKEND_URL }}" ]; then
            printf 'window.MO_PLATE_API = "%s";\n' "${{ vars.BACKEND_URL }}" > _site/config.js
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
